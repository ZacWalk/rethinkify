name: Build

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v3
        with:
          vs-prerelease: true
          vs-version: '[18.0,19.0)'
          msbuild-architecture: x64

      - name: Build solution
        run: msbuild rethinkify.sln /p:Configuration=Debug /p:Platform=x64 /m

      - name: Run unit tests
        shell: pwsh
        run: |
          & .\exe\rethinkify64d.exe /test
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }